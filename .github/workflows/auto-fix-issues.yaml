name: Auto Fix Issues

on:
  issues:
    types: [labeled]

concurrency:
  group: fix-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'auto-fix'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install mini-swe-agent
        run: uv pip install --python ${Python_ROOT_DIR} -e '.[full]'

      - name: Configure mini-swe-agent
        run: |
          mini-extra config set MSWEA_CONFIGURED 'true'
          mini-extra config set OPENAI_API_KEY '${{ secrets.OPENAI_API_KEY }}'
          if [ -n "${{ secrets.OPENAI_API_BASE }}" ]; then
            mini-extra config set OPENAI_API_BASE '${{ secrets.OPENAI_API_BASE }}'
          fi

      - name: Fetch issue and run agent
        id: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          MSWEA_COST_TRACKING: ignore_errors
        run: |
          # Fetch issue title and body
          ISSUE_CONTENT=$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json title,body \
            --jq '.title + "\n\n" + .body')

          echo "Running mini-swe-agent on issue #${{ github.event.issue.number }}..."

          # Determine model name
          MODEL_NAME="${{ secrets.MODEL_NAME }}"
          if [ -z "$MODEL_NAME" ]; then
            MODEL_NAME="openai/gpt-4o"
          fi
          if [ -n "$OPENAI_API_BASE" ] && [[ "$MODEL_NAME" != */* ]]; then
            MODEL_NAME="openai/$MODEL_NAME"
          fi

          # Run agent in yolo mode, exit immediately without prompting
          mini -y --exit-immediately -m "$MODEL_NAME" -t "$ISSUE_CONTENT" \
            -o result.traj.json \
            2>&1 | tee agent_output.log || true

          # Check for any changes (modified, new, deleted files)
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No file changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "File changes detected:"
            git status --short
          fi

          # Extract exit status and agent summary from trajectory
          python3 << 'PYEOF'
          import json
          try:
              data = json.load(open('result.traj.json'))
              info = data.get('info', {})
              with open('exit_status.txt', 'w') as f:
                  f.write(info.get('exit_status', 'Unknown'))

              summary_lines = []
              for msg in data.get('messages', []):
                  if msg.get('role') == 'assistant':
                      content = msg.get('content', '')
                      if content and isinstance(content, str) and content.strip():
                          summary_lines.append(content.strip()[:500])
              summary = "\n\n---\n\n".join(summary_lines[-5:])
              if not summary:
                  summary = "No agent reasoning captured."
          except Exception as e:
              summary = f"Failed to parse trajectory: {e}"
              with open('exit_status.txt', 'w') as f:
                  f.write('Error')

          with open('agent_summary.md', 'w') as f:
              f.write(summary)
          PYEOF

          echo "exit_status=$(cat exit_status.txt)" >> "$GITHUB_OUTPUT"

      - name: Create PR with changes
        if: steps.agent.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          BRANCH_NAME="auto-fix/issue-${ISSUE_NUM}"

          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "fix: auto-fix for issue #${ISSUE_NUM}

          Generated by mini-swe-agent"

          git push --force origin "$BRANCH_NAME"

          # Close any existing PR for this branch before creating a new one
          EXISTING_PR=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --repo "${{ github.repository }}" || true
          fi

          # Create PR linked to the issue
          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --title "Auto-fix: Issue #${ISSUE_NUM}" \
            --body "$(cat <<EOF
          ## 🤖 Automated fix for #${ISSUE_NUM}

          This PR was generated by mini-swe-agent based on the issue description.

          **Exit status:** \`${{ steps.agent.outputs.exit_status }}\`

          ### Agent reasoning

          $(cat agent_summary.md)

          > Review the changes carefully before merging.
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          # Comment on issue with PR link
          gh issue comment "$ISSUE_NUM" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## 🤖 mini-swe-agent completed

          **Exit status:** \`${{ steps.agent.outputs.exit_status }}\`

          **PR created:** $PR_URL

          ### Agent reasoning

          $(cat agent_summary.md)

          > Please review the changes in the PR.
          EOF
          )"

      - name: Comment on issue (no changes)
        if: steps.agent.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## 🤖 mini-swe-agent completed

          **Exit status:** \`${{ steps.agent.outputs.exit_status }}\`

          No file changes were detected. The agent may have determined no fix was needed.

          ### Agent reasoning

          $(cat agent_summary.md)
          EOF
          )"

      - name: Upload trajectory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trajectory-issue-${{ github.event.issue.number }}
          path: |
            result.traj.json
            agent_output.log
          retention-days: 30

      - name: Remove auto-fix label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label "auto-fix" || true
