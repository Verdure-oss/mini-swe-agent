name: Auto Fix Issues

on:
  # 本仓库 issue 打标签触发
  issues:
    types: [labeled]
  # 手动触发（可指定其他仓库）
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo (owner/repo)，留空则处理本仓库 issue'
        required: false
        type: string
      issue_number:
        description: 'Issue number，留空则自动扫描所有打标签的 issue'
        required: false
        type: string

concurrency:
  group: fix-issue-${{ github.event.issue.number || inputs.issue_number || 'scan' }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # 本仓库 issue 打标签触发（原有功能）
  fix-local:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.label.name == 'auto-fix'
    env:
      TARGET_REPO: ${{ github.repository }}
      ISSUE_NUM: ${{ github.event.issue.number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install mini-swe-agent
        run: uv pip install --python ${Python_ROOT_DIR} -e '.[full]'

      - name: Configure mini-swe-agent
        run: |
          mini-extra config set MSWEA_CONFIGURED 'true'
          mini-extra config set OPENAI_API_KEY '${{ secrets.OPENAI_API_KEY }}'
          if [ -n "${{ secrets.OPENAI_API_BASE }}" ]; then
            mini-extra config set OPENAI_API_BASE '${{ secrets.OPENAI_API_BASE }}'
          fi

      - name: Fetch issue and run agent
        id: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          MSWEA_COST_TRACKING: ignore_errors
        run: |
          ISSUE_CONTENT=$(gh issue view "$ISSUE_NUM" \
            --repo "$TARGET_REPO" \
            --json title,body \
            --jq '.title + "\n\n" + .body')

          echo "Running mini-swe-agent on ${TARGET_REPO}#${ISSUE_NUM}..."

          MODEL_NAME="${{ secrets.MODEL_NAME }}"
          if [ -z "$MODEL_NAME" ]; then
            MODEL_NAME="openai/gpt-4o"
          fi
          if [ -n "$OPENAI_API_BASE" ] && [[ "$MODEL_NAME" != */* ]]; then
            MODEL_NAME="openai/$MODEL_NAME"
          fi

          mini -y --exit-immediately -m "$MODEL_NAME" -t "$ISSUE_CONTENT" \
            -o result.traj.json \
            2>&1 | tee agent_output.log || true

          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

          python3 << 'PYEOF'
          import json
          try:
              data = json.load(open('result.traj.json'))
              info = data.get('info', {})
              with open('exit_status.txt', 'w') as f:
                  f.write(info.get('exit_status', 'Unknown'))
              summary_lines = []
              for msg in data.get('messages', []):
                  if msg.get('role') == 'assistant':
                      content = msg.get('content', '')
                      if content and isinstance(content, str) and content.strip():
                          summary_lines.append(content.strip()[:500])
              summary = "\n\n---\n\n".join(summary_lines[-5:])
              if not summary:
                  summary = "No agent reasoning captured."
          except Exception as e:
              summary = f"Failed to parse trajectory: {e}"
              with open('exit_status.txt', 'w') as f:
                  f.write('Error')
          with open('agent_summary.md', 'w') as f:
              f.write(summary)
          PYEOF

          echo "exit_status=$(cat exit_status.txt)" >> "$GITHUB_OUTPUT"

      - name: Create PR with changes
        if: steps.agent.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="auto-fix/issue-${ISSUE_NUM}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "fix: auto-fix for issue #${ISSUE_NUM}

          Generated by mini-swe-agent"
          git push --force origin "$BRANCH_NAME"

          EXISTING_PR=$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --repo "$TARGET_REPO" || true
          fi

          PR_URL=$(gh pr create \
            --repo "$TARGET_REPO" \
            --title "Auto-fix: Issue #${ISSUE_NUM}" \
            --body "$(cat <<EOF
          ## 🤖 Automated fix for #${ISSUE_NUM}

          **Exit status:** \`${{ steps.agent.outputs.exit_status }}\`

          ### Agent reasoning

          $(cat agent_summary.md)

          > Review the changes carefully before merging.
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          gh issue comment "$ISSUE_NUM" \
            --repo "$TARGET_REPO" \
            --body "$(cat <<EOF
          ## 🤖 mini-swe-agent completed

          **Exit status:** \`${{ steps.agent.outputs.exit_status }}\`
          **PR created:** $PR_URL

          ### Agent reasoning

          $(cat agent_summary.md)
          EOF
          )"

      - name: Comment on issue (no changes)
        if: steps.agent.outputs.has_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "$ISSUE_NUM" \
            --repo "$TARGET_REPO" \
            --body "$(cat <<EOF
          ## 🤖 mini-swe-agent completed

          **Exit status:** \`${{ steps.agent.outputs.exit_status }}\`

          No file changes were detected.

          ### Agent reasoning

          $(cat agent_summary.md)
          EOF
          )"

      - name: Upload trajectory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trajectory-issue-${{ env.ISSUE_NUM }}
          path: |
            result.traj.json
            agent_output.log
          retention-days: 30

      - name: Remove auto-fix label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "$ISSUE_NUM" \
            --repo "$TARGET_REPO" \
            --remove-label "auto-fix" || true

  # 手动触发：扫描指定仓库（或本仓库）的所有 auto-fix 标签 issue
  fix-external:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      TARGET_REPO: ${{ inputs.target_repo || github.repository }}
      ISSUE_NUM: ${{ inputs.issue_number }}
      GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout agent repo
        uses: actions/checkout@v7
        with:
          path: agent-repo

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install mini-swe-agent
        run: |
          cd agent-repo
          uv pip install --python ${Python_ROOT_DIR} -e '.[full]'

      - name: Configure mini-swe-agent
        run: |
          cd agent-repo
          mini-extra config set MSWEA_CONFIGURED 'true'
          mini-extra config set OPENAI_API_KEY '${{ secrets.OPENAI_API_KEY }}'
          if [ -n "${{ secrets.OPENAI_API_BASE }}" ]; then
            mini-extra config set OPENAI_API_BASE '${{ secrets.OPENAI_API_BASE }}'
          fi

      - name: Resolve issues to process
        id: resolve
        run: |
          if [ -n "$ISSUE_NUM" ]; then
            # 指定了 issue 编号，直接处理
            echo "issues=[\"$ISSUE_NUM\"]" >> "$GITHUB_OUTPUT"
          else
            # 扫描目标仓库所有 auto-fix 标签的 issue
            ISSUES=$(gh issue list --repo "$TARGET_REPO" --label "auto-fix" --json number --jq '[.[].number]')
            echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"
            echo "Found issues: $ISSUES"
          fi

      - name: Clone target repo
        run: |
          # 尝试 fork 模式克隆
          TARGET_NAME=$(echo "$TARGET_REPO" | cut -d'/' -f2)
          FORK_OWNER=$(gh api user --jq '.login')
          FORK_REPO="${FORK_OWNER}/${TARGET_NAME}"

          if [ "$TARGET_REPO" = "${{ github.repository }}" ]; then
            # 本仓库，直接用已 checkout 的代码
            cp -r agent-repo target
          else
            # 外部仓库，检查 fork 是否存在
            if ! gh repo view "$FORK_REPO" &>/dev/null; then
              echo "Forking ${TARGET_REPO}..."
              gh repo fork "$TARGET_REPO" --clone=false
              sleep 5
            fi
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${FORK_REPO}.git" target
            cd target
            git remote add upstream "https://github.com/${TARGET_REPO}.git" 2>/dev/null || true
            git fetch upstream 2>/dev/null || true
          fi

      - name: Process each issue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          MSWEA_COST_TRACKING: ignore_errors
        run: |
          cd target
          ISSUES='${{ steps.resolve.outputs.issues }}'

          MODEL_NAME="${{ secrets.MODEL_NAME }}"
          if [ -z "$MODEL_NAME" ]; then
            MODEL_NAME="openai/gpt-4o"
          fi
          if [ -n "$OPENAI_API_BASE" ] && [[ "$MODEL_NAME" != */* ]]; then
            MODEL_NAME="openai/$MODEL_NAME"
          fi

          # 遍历每个 issue
          echo "$ISSUES" | python3 -c "
          import json, sys
          issues = json.load(sys.stdin)
          for issue_num in issues:
              print(issue_num)
          " | while read -r ISSUE_NUM; do
            echo "=========================================="
            echo "Processing ${TARGET_REPO}#${ISSUE_NUM}..."
            echo "=========================================="

            # 读取 issue 内容
            ISSUE_CONTENT=$(gh issue view "$ISSUE_NUM" \
              --repo "$TARGET_REPO" \
              --json title,body \
              --jq '.title + "\n\n" + .body')

            # 运行 agent
            cd ..
            rm -f result.traj.json agent_output.log
            cd target
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true

            mini -y --exit-immediately -m "$MODEL_NAME" -t "$ISSUE_CONTENT" \
              -o ../result.traj.json \
              2>&1 | tee ../agent_output.log || true

            # 检查变更
            if [ -n "$(git status --porcelain)" ]; then
              echo "Changes detected for #${ISSUE_NUM}, creating PR..."

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

              BRANCH_NAME="auto-fix/issue-${ISSUE_NUM}"
              git checkout -b "$BRANCH_NAME" 2>/dev/null || git checkout "$BRANCH_NAME"
              git add -A
              git commit -m "fix: auto-fix for issue #${ISSUE_NUM}

              Generated by mini-swe-agent"
              git push --force origin "$BRANCH_NAME"

              # 提取摘要
              python3 << 'PYEOF'
              import json
              try:
                  data = json.load(open('../result.traj.json'))
                  info = data.get('info', {})
                  with open('../exit_status.txt', 'w') as f:
                      f.write(info.get('exit_status', 'Unknown'))
                  summary_lines = []
                  for msg in data.get('messages', []):
                      if msg.get('role') == 'assistant':
                          content = msg.get('content', '')
                          if content and isinstance(content, str) and content.strip():
                              summary_lines.append(content.strip()[:500])
                  summary = "\n\n---\n\n".join(summary_lines[-5:])
                  if not summary:
                      summary = "No agent reasoning captured."
              except Exception as e:
                  summary = f"Failed to parse trajectory: {e}"
                  with open('../exit_status.txt', 'w') as f:
                      f.write('Error')
              with open('../agent_summary.md', 'w') as f:
                  f.write(summary)
              PYEOF

              EXIT_STATUS=$(cat ../exit_status.txt)

              # 创建 PR
              FORK_OWNER=$(gh api user --jq '.login')
              EXISTING_PR=$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
              if [ -n "$EXISTING_PR" ]; then
                gh pr close "$EXISTING_PR" --repo "$TARGET_REPO" || true
              fi

              if [ "$TARGET_REPO" = "${{ github.repository }}" ]; then
                PR_URL=$(gh pr create \
                  --repo "$TARGET_REPO" \
                  --title "Auto-fix: Issue #${ISSUE_NUM}" \
                  --body "$(cat <<EOF
              ## 🤖 Automated fix for #${ISSUE_NUM}

              **Exit status:** \`${EXIT_STATUS}\`

              ### Agent reasoning

              $(cat ../agent_summary.md)
              EOF
              )" \
                  --base main \
                  --head "$BRANCH_NAME")
              else
                PR_URL=$(gh pr create \
                  --repo "$TARGET_REPO" \
                  --title "Auto-fix: Issue #${ISSUE_NUM}" \
                  --body "$(cat <<EOF
              ## 🤖 Automated fix for #${ISSUE_NUM}

              **Exit status:** \`${EXIT_STATUS}\`

              ### Agent reasoning

              $(cat ../agent_summary.md)
              EOF
              )" \
                  --base main \
                  --head "${FORK_OWNER}:${BRANCH_NAME}")
              fi

              # 评论到 issue
              gh issue comment "$ISSUE_NUM" \
                --repo "$TARGET_REPO" \
                --body "$(cat <<EOF
              ## 🤖 mini-swe-agent completed

              **Exit status:** \`${EXIT_STATUS}\`
              **PR created:** $PR_URL

              ### Agent reasoning

              $(cat ../agent_summary.md)
              EOF
              )"

              # 移除标签
              gh issue edit "$ISSUE_NUM" --repo "$TARGET_REPO" --remove-label "auto-fix" || true

              # 切回主分支继续处理下一个
              git checkout main 2>/dev/null || git checkout master 2>/dev/null
            else
              echo "No changes for #${ISSUE_NUM}, skipping."
              gh issue comment "$ISSUE_NUM" \
                --repo "$TARGET_REPO" \
                --body "## 🤖 mini-swe-agent completed

              No file changes were detected."
              gh issue edit "$ISSUE_NUM" --repo "$TARGET_REPO" --remove-label "auto-fix" || true
            fi
          done
